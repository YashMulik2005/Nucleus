spring.application.name=Nucleus

# ===============================
# Database Configuration
# ===============================
spring.datasource.url=your_db_url
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT Configuration
# ===============================
jwt.accessTokenKey=your_access_token_secret
jwt.refreshTokenKey=your_refresh_token_secret


# ===============================
# AWS S3 Configuration
# ===============================
aws.s3.accessKey=your_access_key
aws.s3.secretKey=your_secret_key
aws.s3.region=your_region
aws.s3.bucketName=your_bucket_name
